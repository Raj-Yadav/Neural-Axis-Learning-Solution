name: Neural Axis CD Deployment

on:
  push:
    branches: [ main, master ]

jobs:
  # -----------------------------------------------------------------
  # JOB 1: Build & Deploy FastAPI Backend
  # -----------------------------------------------------------------
  deploy-backend:
    name: Build & Push Backend Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: acrneuralaxisprod.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t acrneuralaxisprod.azurecr.io/backend:${{ github.sha }} ./backend
          docker push acrneuralaxisprod.azurecr.io/backend:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: acrneuralaxisprod.azurecr.io/backend:${{ github.sha }}
          resourceGroup: rg-neuralaxis-prod
          containerAppName: ca-backend

  # -----------------------------------------------------------------
  # JOB 2: Build & Deploy React Frontend
  # -----------------------------------------------------------------
  deploy-frontend:
    name: Build & Deploy React Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend" # Location of source code
          api_location: ""           # Empty since backend is hosted separately
          output_location: "build"   # Build artifact directory
