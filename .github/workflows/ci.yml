name: Neural Axis CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # -----------------------------------------------------------------
  # JOB 1: Backend Testing (FastAPI)
  # -----------------------------------------------------------------
  backend-tests:
    name: Run Backend Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx pytest-asyncio

      - name: Run Pytest
        run: python -m pytest tests/test_server.py
        # Important: Add dummy env vars so server.py doesn't crash on import
        env:
          MONGO_URL: "mongodb://localhost:27017/dummy"
          DB_NAME: "neural_axis_test"
          JWT_SECRET: "test-secret"
          REACT_APP_BACKEND_URL: "http://localhost:8000"

  # -----------------------------------------------------------------
  # JOB 2: Frontend Testing (React)
  # -----------------------------------------------------------------
  frontend-tests:
    name: Run Frontend Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        # Important: Added --legacy-peer-deps to bypass React 19 conflicts
        run: npm install --legacy-peer-deps

      - name: Run Frontend Tests
        run: npm run test:ci
        env:
          CI: true 

      - name: Build Check
        run: npm run build
        env:
          CI: false
